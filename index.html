<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Game Bird Betting App</title>
    <meta name="description" content="Real-time betting app for Game Bird matches" />
    <meta name="author" content="Game Bird" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- CRITICAL: Prevent caching of this HTML file -->
    <!-- Safari and browsers should always fetch fresh HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00FFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Game Bird" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="screen-orientation" content="landscape" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    
    <!-- Basic styling -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background-color: black;
        overscroll-behavior: none;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
    </style>
  </head>

  <body>
    <!-- Safari PWA pull-down trap — absorbs swipe-down gesture at top of screen -->
    <div style="position:fixed;top:0;left:0;right:0;height:24px;z-index:99999;background:transparent;" ontouchstart="event.preventDefault()" ontouchmove="event.preventDefault()"></div>
    <div id="root" style="width: 100%; height: 100%; background: black;"></div>

    <!-- Portrait mode warning -->
    <div id="portrait-warning">
      <div class="rotate-icon">⟳</div>
      <div style="font-size: 1.4rem; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;">Rotate Your Device</div>
      <div style="font-size: 1rem; color: #888; margin-top: 4px;">GameBird is optimized for landscape</div>
    </div>
    
    <!-- Fallback if React fails to render -->
    <script>
      // Log when app starts
      console.log('🚀 Game Bird App Loading...');
      
      // Global error handler to catch any issues
      window.addEventListener('error', (event) => {
        console.error('❌ Global Error:', event.error);
      });
      
      window.addEventListener('unhandledrejection', (event) => {
        console.error('❌ Unhandled Rejection:', event.reason);
      });
    </script>
    
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      // Lock to landscape + go fullscreen to hide browser chrome
      function enterFullscreenLandscape() {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (req) req.call(el).catch(() => {});
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      }
      // Trigger on first user interaction (browsers require a gesture for fullscreen)
      document.addEventListener('click', enterFullscreenLandscape, { once: true });
      document.addEventListener('touchstart', enterFullscreenLandscape, { once: true });

      // Block pull-to-reveal browser chrome on Safari PWA
      let lastY = 0;
      document.addEventListener('touchstart', function(e) {
        lastY = e.touches[0].clientY;
      }, { passive: true });
      document.addEventListener('touchmove', function(e) {
        const scrollTop = document.scrollingElement ? document.scrollingElement.scrollTop : 0;
        const dy = e.touches[0].clientY - lastY;
        // Block pull-down only when already at the top
        if (dy > 0 && scrollTop === 0) {
          e.preventDefault();
        }
      }, { passive: false });
      
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Aggressive Service Worker management for cache busting
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            // Unregister all old Service Workers
            for (let reg of registrations) {
              console.log('🧹 Unregistering old SW:', reg.scope);
              reg.unregister();
            }
            
            // Register fresh Service Worker with cache busting
            navigator.serviceWorker.register('/sw.js?v=' + Date.now())
              .then((registration) => {
                console.log('✅ SW registered (fresh):', registration.scope);
                // Check for updates every 5 seconds
                setInterval(() => {
                  registration.update();
                }, 5000);
              })
              .catch((registrationError) => {
                console.error('❌ SW registration failed:', registrationError);
              });
          });
        });
        
        // Also check for SW updates on page visibility change
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.getRegistrations().then((registrations) => {
              for (let reg of registrations) {
                reg.update();
              }
            });
          }
        });
      }
    </script>
  </body>
</html>

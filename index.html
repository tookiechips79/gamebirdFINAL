<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Game Bird Betting App</title>
    <meta name="description" content="Real-time betting app for Game Bird matches" />
    <meta name="author" content="Game Bird" />
    <meta property="og:image" content="/og-image.png" />

    <!-- CRITICAL: Prevent caching of this HTML file -->
    <!-- Safari and browsers should always fetch fresh HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00FFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Game Bird" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="screen-orientation" content="portrait" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Basic styling -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: black;
      }

      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root" style="width: 100%; height: 100%; background: black;"></div>


    <script>
      console.log('🚀 Game Bird App Loading...');
      window.addEventListener('error', (event) => { console.error('❌ Global Error:', event.error); });
      window.addEventListener('unhandledrejection', (event) => { console.error('❌ Unhandled Rejection:', event.reason); });
    </script>

    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>

    <script>

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let reg of registrations) {
              console.log('🧹 Unregistering old SW:', reg.scope);
              reg.unregister();
            }
            navigator.serviceWorker.register('/sw.js?v=' + Date.now())
              .then((registration) => {
                console.log('✅ SW registered (fresh):', registration.scope);
                setInterval(() => { registration.update(); }, 5000);
              })
              .catch((err) => { console.error('❌ SW registration failed:', err); });
          });
        });
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.getRegistrations().then((registrations) => {
              for (let reg of registrations) reg.update();
            });
          }
        });
      }
    </script>
  </body>
</html>
